name: Release

# Trigger on pushes to main.
# - If unreleased changesets exist, changesets/action opens or updates
#   a "Version Packages" PR (consuming the changesets into a version bump
#   + CHANGELOG entry).
# - When that Version PR is merged (next push to main), the action detects
#   no pending changesets and instead runs the publish path, which builds
#   Rust binaries, stages them, and publishes to npm.
#
# Auth: a GitHub App (APP_ID / APP_PRIVATE_KEY secrets) mints a short-lived
# token used for `git push`, the Version Packages PR, and tag creation.
# Unlike the default GITHUB_TOKEN, pushes made with an app token DO trigger
# downstream workflow runs — so CI actually runs on the Version PR's update
# commits. NPM_TOKEN is a registry-access token for publish.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run publish in dry-run mode (no actual upload)"
        required: false
        default: false
        type: boolean

# Serialize release runs so overlapping pushes to main don't race on
# the Version PR or the registry. cancel-in-progress stays false — we
# never want to drop a run that might need to publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# contents: write — push the "Version Packages" PR and tag.
# pull-requests: write — open and update the Version PR.
# id-token: write — mint the OIDC token npm provenance needs.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # Phase 1: Version check. On push events, either opens/updates the Version PR,
  # or (if no pending changesets) signals that we're ready to publish.
  #
  # Skipped on workflow_dispatch with dry_run=true — dry-run bypasses the
  # version gate so the full build+stage+publish path runs end-to-end
  # against the current tree (useful on a feature branch before merge).
  version-or-check:
    name: Version PR or check for publish
    # Canonical-repo guard: forks can never publish even with a stolen token.
    if: github.repository == 'iceglober/glrs' && github.event_name == 'push'
    runs-on: ubuntu-22.04
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
      assume_version: ${{ steps.get-version.outputs.version }}
    steps:
      # Mint a short-lived token from the GitHub App.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build

      # Run changesets/action in version-only mode. This either opens/updates
      # the Version PR (if changesets exist) or does nothing (if we're on
      # main after the Version PR merged).
      - name: Create Version PR or check for publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: echo "publish handled in separate job"
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      # Read the assume version after potential version bump
      - name: Get assume version
        id: get-version
        run: |
          VERSION=$(cat packages/assume/package.json | grep '"version"' | head -1 | awk -F: '{ print $2 }' | sed 's/[",]//g' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Assume version: $VERSION"

  # Phase 1b: Extract current assume version for dry-run path (workflow_dispatch only).
  # This is a tiny job that just reads packages/assume/package.json so build-rust
  # + publish can get a version input without going through the changesets action.
  dry-run-version:
    name: Read version (dry-run only)
    if: github.repository == 'iceglober/glrs' && github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
    runs-on: ubuntu-22.04
    outputs:
      assume_version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Get assume version
        id: get-version
        run: |
          VERSION=$(cat packages/assume/package.json | grep '"version"' | head -1 | awk -F: '{ print $2 }' | sed 's/[",]//g' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Assume version: $VERSION"

  # Phase 2: Build Rust binaries. Runs when:
  #   - Normal publish path (push trigger, Version PR just merged → hasChangesets=false), OR
  #   - Dry-run (workflow_dispatch with dry_run=true, bypassing the version gate)
  build-rust:
    name: Build Rust binaries
    needs: [version-or-check, dry-run-version]
    # `always()` here means: evaluate even if one of `needs` was skipped.
    # We run when either upstream job produced the version output successfully.
    if: |
      always() &&
      (
        (needs.version-or-check.result == 'success' && needs.version-or-check.outputs.hasChangesets == 'false') ||
        (needs.dry-run-version.result == 'success')
      )
    uses: ./.github/workflows/rust-build-matrix.yml
    with:
      version: ${{ needs.version-or-check.outputs.assume_version || needs.dry-run-version.outputs.assume_version }}
    secrets: inherit

  # Phase 3: Publish. Runs under the same gate as build-rust, after it succeeds.
  publish:
    name: Publish to npm
    needs: [version-or-check, dry-run-version, build-rust]
    if: |
      always() &&
      needs.build-rust.result == 'success' &&
      (
        (needs.version-or-check.result == 'success' && needs.version-or-check.outputs.hasChangesets == 'false') ||
        (needs.dry-run-version.result == 'success')
      )
    runs-on: ubuntu-22.04
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build

      # Download all platform artifacts produced by build-rust
      - name: Download Rust artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: assume-*-${{ needs.version-or-check.outputs.assume_version || needs.dry-run-version.outputs.assume_version }}
          path: packages/assume/.release-artifacts/
          merge-multiple: false

      # Rename artifact subdirs from assume-<platform>-<version> to <platform>
      # so pack-platform-tarballs.mjs finds them at the expected path
      - name: Rename artifact directories
        working-directory: packages/assume/.release-artifacts
        run: |
          for dir in assume-*; do
            if [ -d "$dir" ]; then
              # Extract platform name: assume-<platform>-<version> -> <platform>
              platform=$(echo "$dir" | sed 's/assume-\(.*\)-.*/\1/')
              mv "$dir" "$platform"
              echo "Renamed $dir -> $platform"
            fi
          done

      # Stage binaries into each platform package's bin/ directory
      - name: Pack platform tarballs
        run: bun run --cwd packages/assume pack:platforms

      # Publish all packages. NPM_CONFIG_DRY_RUN=true when workflow_dispatch dry_run is true.
      - name: Publish to npm
        id: npm-publish
        run: bunx changeset publish
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && 'true' || '' }}

      # Push tags created by `changeset publish` so gh release --verify-tag
      # can find them on the remote.
      - name: Push tags
        run: git push --tags
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      # Create a GitHub release for the main package and attach platform
      # binaries as release assets. Auto-upgrade in gs-assume (update_check.rs)
      # downloads from this URL pattern:
      #
      #   https://github.com/iceglober/glrs/releases/download/
      #     @glrs-dev/assume@<version>/gs-assume-<platform>
      #
      # Asset names use the legacy `*-amd64` suffix (NOT `*-x64`) so that
      # pre-monorepo installs of gs-assume 0.6.3 and earlier, whose
      # detect_platform() returns `amd64`, can auto-upgrade to the new
      # binaries. Keeping `-amd64` frozen is the transition contract.
      #
      # Skipped on dry-run — no real tag exists, and we don't want to create
      # release artifacts when NPM_CONFIG_DRY_RUN=true.
      - name: Attach platform binaries to GitHub release
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ needs.version-or-check.outputs.assume_version || needs.dry-run-version.outputs.assume_version }}
        run: |
          set -euo pipefail
          TAG="@glrs-dev/assume@${VERSION}"

          # Create the GitHub release for the main package tag if it doesn't
          # already exist. `changeset publish` creates the git tag but not a
          # GitHub release — we layer one on top so `gh release upload` works.
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "@glrs-dev/assume@${VERSION}" \
              --notes "See packages/assume/CHANGELOG.md for details." \
              --verify-tag
            echo "Created release $TAG"
          else
            echo "Release $TAG already exists — appending assets"
          fi

          # Upload binaries under legacy `*-amd64` names so pre-monorepo
          # installs can auto-upgrade. Our artifact dirs are `*-x64`; map
          # on upload.
          declare -A ASSET_MAP=(
            ["darwin-arm64"]="gs-assume-darwin-arm64"
            ["darwin-x64"]="gs-assume-darwin-amd64"
            ["linux-arm64"]="gs-assume-linux-arm64"
            ["linux-x64"]="gs-assume-linux-amd64"
          )

          cd packages/assume/.release-artifacts
          for plat in "${!ASSET_MAP[@]}"; do
            asset_name="${ASSET_MAP[$plat]}"
            src="$plat/gs-assume"
            if [ ! -f "$src" ]; then
              echo "MISSING: $src" >&2
              exit 1
            fi
            # Re-upload atomically via `--clobber` so re-running the
            # workflow (e.g. after a transient failure) replaces partial
            # uploads instead of erroring.
            gh release upload "$TAG" "$src#$asset_name" --clobber
            echo "Attached $asset_name (from $plat/gs-assume)"
          done

      # crates.io publishing for the `glrs-assume` crate is deliberately
      # NOT wired here yet. When we're ready to also publish to crates.io:
      #   1. Create a crates.io token at https://crates.io/me and scope it
      #      to publish-new + publish-update for `glrs-assume`.
      #   2. `gh secret set CARGO_REGISTRY_TOKEN --repo iceglober/glrs`
      #   3. Re-add a step that runs `cd packages/assume && cargo publish
      #      --token $CARGO_REGISTRY_TOKEN` when steps.changesets.outputs.
      #      published == 'true' and the publish set includes
      #      @glrs-dev/assume.
      # Tracked as follow-up work; see the plan's Open questions section.

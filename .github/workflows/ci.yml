name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ts:
    name: TS build / test / typecheck
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun run test
      - name: Lint
        run: bun run lint

  rust:
    name: Rust (assume) build / test / clippy / fmt
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: cargo fmt
        working-directory: packages/assume
        run: cargo fmt --check
      - name: cargo clippy
        working-directory: packages/assume
        run: cargo clippy -- -D warnings
      - name: cargo build
        working-directory: packages/assume
        run: cargo build --release
      - name: cargo test
        working-directory: packages/assume
        run: cargo test --release

  verdaccio-smoke:
    name: Verdaccio e2e smoke test
    runs-on: ubuntu-22.04
    needs: [ts, rust]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Run verdaccio smoke script
        run: bash scripts/verdaccio-smoke.sh

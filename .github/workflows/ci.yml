name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ts:
    name: TS build / test / typecheck
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun run test
      - name: Lint
        run: bun run lint

  rust-changes:
    name: Check for Rust changes
    runs-on: ubuntu-22.04
    outputs:
      changed: ${{ steps.filter.outputs.assume }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            assume:
              - 'packages/assume/**'

  rust:
    name: Rust (assume) build / test / clippy / fmt
    runs-on: ubuntu-22.04
    needs: rust-changes
    if: needs.rust-changes.outputs.changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: cargo fmt
        working-directory: packages/assume
        run: cargo fmt --check
      - name: cargo clippy
        working-directory: packages/assume
        run: cargo clippy -- -D warnings
      - name: cargo build
        working-directory: packages/assume
        run: cargo build --release
      - name: cargo test
        working-directory: packages/assume
        run: cargo test --release

  # Gate job for branch protection — always succeeds whether rust ran or was skipped.
  rust-gate:
    name: Rust gate
    runs-on: ubuntu-22.04
    needs: [rust-changes, rust]
    if: always()
    steps:
      - run: |
          if [[ "${{ needs.rust-changes.outputs.changed }}" != "true" ]]; then
            echo "Rust not changed — skipping"
            exit 0
          fi
          if [[ "${{ needs.rust.result }}" != "success" ]]; then
            echo "Rust job failed"
            exit 1
          fi

  verdaccio-smoke:
    name: Verdaccio e2e smoke test
    runs-on: ubuntu-22.04
    needs: [ts]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Run verdaccio smoke script
        run: bash scripts/verdaccio-smoke.sh

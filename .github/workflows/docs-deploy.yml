name: Deploy docs to glrs.dev

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs-deploy.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build + auth check only; skip rsync + cache invalidation"
        required: false
        type: boolean
        default: false

concurrency:
  group: docs-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write  # for GCP workload identity federation

jobs:
  deploy:
    name: Build + deploy docs
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm --filter @glrs-dev/docs build

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify auth
        run: |
          gcloud auth list
          gcloud config list

      - name: Rsync to GCS bucket
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
        run: |
          gsutil -m rsync -d -r docs/dist/ gs://${{ vars.GCP_DOCS_BUCKET }}/

      - name: Invalidate CDN cache
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
        run: |
          gcloud compute url-maps invalidate-cdn-cache \
            ${{ vars.GCP_URL_MAP }} \
            --path "/*" \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --async

      - name: Dry-run summary
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
        run: |
          echo "DRY RUN: would rsync docs/dist/ → gs://${{ vars.GCP_DOCS_BUCKET }}/"
          echo "DRY RUN: would invalidate cache on url-map ${{ vars.GCP_URL_MAP }}"
          ls -la docs/dist/ | head -20

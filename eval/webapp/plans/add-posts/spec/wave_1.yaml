items:
  - id: "1.1"
    intent: "Create test/posts.test.ts with integration tests covering all five posts endpoints. Tests create a user first (posts need a valid user_id) then exercise POST, GET list, GET by id, GET 404, PUT, DELETE, plus an error case for creating a post with a nonexistent user_id."
    checked: false
    files:
      - path: test/posts.test.ts
        isNew: true
        change: "New bun:test integration suite mirroring test/users.test.ts: PORT 3457 (or distinct from users), beforeAll runs migrations and starts app.listen, afterAll closes server and pool, beforeEach TRUNCATEs posts (and users) RESTART IDENTITY CASCADE, individual tests POST a user then drive /api/posts."
    tests:
      - "test/posts.test.ts"
    verify: "bun test test/posts.test.ts"
    mirror: "test/users.test.ts"
    context: |
      import { describe, it, expect, beforeAll, afterAll, beforeEach } from "bun:test";
      import { pool } from "../src/db.js";
      import { app } from "../src/app.js";
      import type { Server } from "http";

      const PORT = 3457;
      const BASE = `http://localhost:${PORT}/api/users`;

      let server: Server;

      beforeAll(async () => {
        // run all *.sql files in ../migrations in sorted order through pool.query
        server = app.listen(PORT);
        await new Promise<void>((resolve) => server.on("listening", resolve));
      });

      afterAll(async () => {
        server.close();
        await pool.end();
      });

      beforeEach(async () => {
        await pool.query("TRUNCATE users RESTART IDENTITY CASCADE");
      });
    conventions: "bun:test (describe/it/expect/beforeAll/afterAll/beforeEach); ESM imports with .js extension for source modules; real HTTP via fetch against app.listen on a dedicated test port; TRUNCATE ... RESTART IDENTITY CASCADE between tests; assert res.status then await res.json(); 201 on create, 200 on read/update, 204 on delete, 404 for missing."
    proof: "bun test test/posts.test.ts passes. The suite contains tests for: POST /api/posts (create after seeding a user) → 201 with id/title/body/user_id; GET /api/posts → list contains the created post; GET /api/posts/:id → 200 with the matching row; GET /api/posts/999 → 404; PUT /api/posts/:id → 200 with updated fields (partial update preserves untouched columns); DELETE /api/posts/:id → 204 and a follow-up GET returns 404; POST /api/posts with a user_id that does not exist → non-2xx error (e.g. 400 or 500 surfacing a FK violation). Use a port distinct from test/users.test.ts to avoid collisions when both suites run."
    proof_type: "test"

  - id: "1.2"
    intent: "Add a posts section to public/index.html below the users table: a posts table (title, body, author name) and a create form with a user-select dropdown, title input, and body textarea. Wires up via the same vanilla fetch pattern used by the existing users UI."
    checked: false
    files:
      - path: public/index.html
        isNew: false
        change: "Append a <section> with <h1>Posts</h1>, a table (Title/Body/Author/delete), and an <form id=\"add-post-form\"> containing a <select id=\"post-user-select\">, <input id=\"post-title-input\">, <textarea id=\"post-body-input\">, and submit button. Extend the inline <script> with loadPosts() (fetch /api/posts, render rows, wire per-row delete), populate the user dropdown from loadUsers(), and a submit handler that POSTs { user_id, title, body } to /api/posts then reloads."
    tests:
      - "Manual visual check"
    verify: "curl -s http://localhost:3456/ | grep -q \"posts\""
    mirror: "public/index.html"
    context: |
      <h1>Users</h1>
      <table>
        <thead><tr><th>ID</th><th>Name</th><th>Email</th><th></th></tr></thead>
        <tbody id="users-body"></tbody>
      </table>
      <form id="add-form">
        <input id="name-input" placeholder="Name" required>
        <input id="email-input" placeholder="Email" type="email" required>
        <button type="submit">Add User</button>
      </form>

      <script>
        async function loadUsers() {
          const res = await fetch('/api/users');
          const users = await res.json();
          // render rows, wire delete buttons
        }
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          await fetch('/api/users', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, email }) });
          loadUsers();
        });
      </script>
    conventions: "Plain HTML + inline <style> + inline vanilla JS (no framework, no bundler); IDs in kebab-case; fetch('/api/<resource>') with JSON body; per-row delete buttons rebuilt on each load; reload-after-mutation pattern (no optimistic updates); shared CSS classes (.delete-btn) already defined."
    proof: "The served index.html contains a posts section (curl http://localhost:3456/ | grep -q posts succeeds). In a browser at http://localhost:3456/: a Posts heading appears below Users; the user dropdown lists existing users; submitting the form creates a row via POST /api/posts and the new post immediately appears in the posts table with the author's name (not just user_id); the per-row × button DELETEs the post and the row disappears."
    proof_type: "manual"

  - id: "1.3"
    intent: "Confirm the users test suite still passes after the migration and routing changes from wave 0 and the UI changes in 1.2 — no regressions to existing user CRUD behavior."
    checked: true
    files: []
    tests:
      - "test/users.test.ts"
    verify: "bun test test/users.test.ts"
    mirror: "test/users.test.ts"
    context: |
      // Existing users suite covers: POST creates, GET lists, GET by id, GET 404,
      // PUT updates (partial), DELETE returns 204 and subsequent GET is 404.
      // beforeEach TRUNCATE users RESTART IDENTITY CASCADE.
      // The new posts migration adds an FK posts.user_id -> users(id) ON DELETE CASCADE,
      // so users CASCADE truncation must still succeed and DELETE user must cascade.
    conventions: "Same bun:test conventions as 1.1. No code changes expected for this item — it is a verification gate."
    proof: "bun test test/users.test.ts exits 0 with all existing users tests passing. The posts table's FK to users does not break the TRUNCATE ... CASCADE in beforeEach, and DELETE /api/users/:id still returns 204 (cascading any dependent posts)."
    proof_type: "test"

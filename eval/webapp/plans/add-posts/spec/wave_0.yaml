items:
  - id: "0.1"
    intent: "Add a SQL migration that creates the posts table with id, title, body, user_id (FK to users), and created_at columns."
    checked: true
    files:
      - path: migrations/002_create_posts.sql
        isNew: true
        change: "New SQL migration file creating posts table with FK to users(id) ON DELETE CASCADE."
    tests:
      - "Manually verify via bun run src/migrate.ts"
    verify: "bun run src/migrate.ts"
    mirror: "migrations/001_create_users.sql"
    context: |
      CREATE TABLE IF NOT EXISTS users (
        id SERIAL PRIMARY KEY,
        name TEXT NOT NULL,
        email TEXT UNIQUE NOT NULL,
        created_at TIMESTAMPTZ DEFAULT NOW()
      );
    conventions: "Use CREATE TABLE IF NOT EXISTS, SERIAL PRIMARY KEY, TIMESTAMPTZ DEFAULT NOW(); migration files numbered sequentially (NNN_description.sql)."
    proof: "Running `bun run src/migrate.ts` succeeds and creates a posts table with columns id (SERIAL PK), title (TEXT NOT NULL), body (TEXT NOT NULL), user_id (INTEGER NOT NULL, FK to users.id, ON DELETE CASCADE), created_at (TIMESTAMPTZ default now)."
    proof_type: "script"

  - id: "0.2"
    intent: "Create an Express router at src/routes/posts.ts with five CRUD endpoints following the same patterns as src/routes/users.ts."
    checked: false
    files:
      - path: src/routes/posts.ts
        isNew: true
        change: "New Express router exporting postsRouter with GET / (list, ORDER BY created_at DESC), GET /:id (404 if not found), POST / (require title/body/user_id, validate user_id exists, return 201), PUT /:id (update title and/or body), DELETE /:id (204 on success)."
    tests:
      - "test/posts.test.ts"
    verify: "bun test test/posts.test.ts"
    mirror: "src/routes/users.ts"
    context: |
      import { Router, type Request, type Response } from "express";
      import { pool } from "../db.js";

      export const usersRouter = Router();

      usersRouter.get("/", async (_req, res) => {
        const { rows } = await pool.query("SELECT * FROM users ORDER BY id");
        res.json(rows);
      });

      usersRouter.post("/", async (req, res) => {
        const { name, email } = req.body;
        if (!name || !email) {
          res.status(400).json({ error: "name and email are required" });
          return;
        }
        const { rows } = await pool.query(
          "INSERT INTO users (name, email) VALUES ($1, $2) RETURNING *",
          [name, email],
        );
        res.status(201).json(rows[0]);
      });
    conventions: "ESM imports with .js extension; named export of the router (e.g., postsRouter); typed Request/Response from express; pool.query with $N parameter placeholders; 400 for missing fields, 404 with { error } JSON for not found, 201 on create, 204 on delete; COALESCE pattern for partial PUT updates."
    proof: "All endpoints behave correctly: GET /api/posts returns posts ordered by created_at DESC; GET /api/posts/:id returns 404 when missing; POST /api/posts returns 400 when title/body/user_id missing, returns 400/validation error when user_id does not reference an existing user, and 201 with the new row otherwise; PUT /api/posts/:id updates title and/or body (partial updates supported) and returns 404 for unknown id; DELETE /api/posts/:id returns 204 and the post is gone afterward."
    proof_type: "test"

  - id: "0.3"
    intent: "Import the posts router in src/app.ts and mount it at /api/posts, keeping the users router unchanged."
    checked: false
    files:
      - path: src/app.ts
        isNew: false
        change: "Add `import { postsRouter } from \"./routes/posts.js\";` and `app.use(\"/api/posts\", postsRouter);` alongside the existing users router."
    tests:
      - "test/posts.test.ts"
    verify: "bun test test/posts.test.ts"
    mirror: "src/routes/users.ts"
    context: |
      import express from "express";
      import { join } from "path";
      import { usersRouter } from "./routes/users.js";

      export const app = express();

      app.use(express.json());
      app.use(express.static(join(import.meta.dir, "..", "public")));

      // Mount routes
      app.use("/api/users", usersRouter);
    conventions: "ESM imports with .js extension; named import of the router; `app.use(\"/api/<resource>\", <resource>Router)` mounting pattern; preserve existing middleware order (json parser, static, routers, error handler)."
    proof: "src/app.ts imports postsRouter from ./routes/posts.js and mounts it via app.use(\"/api/posts\", postsRouter); the users router is still mounted at /api/users; bun test test/posts.test.ts passes, confirming the posts endpoints are reachable through the app."
    proof_type: "test"

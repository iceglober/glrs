# spec/wave_1.yaml
items:
  - id: "1.1"
    intent: >
      Add a tagging system for posts using a many-to-many relationship: (a) Create
      migrations/006_create_tags.sql with a tags table (id, name UNIQUE, created_at) and a
      post_tags junction table (post_id FK→posts, tag_id FK→tags, composite PK).
      (b) Create src/routes/tags.ts with GET /api/tags (all tags with post count via LEFT JOIN),
      POST /api/tags (requireAuth, create tag, 201, reject duplicate 409),
      POST /api/posts/:postId/tags (requireAuth, tag a post, 201),
      DELETE /api/posts/:postId/tags/:tagId (requireAuth, remove tag, 204),
      GET /api/posts/:postId/tags (list tags for a post). Export router as default.
      Do NOT mount in app.ts. (c) Create test/tags.test.ts on port 3465 that mounts
      the tags router directly for testing.
    checked: true
    files:
      - path: migrations/006_create_tags.sql
        isNew: true
        change: >
          Create tags table with id SERIAL PRIMARY KEY, name TEXT UNIQUE NOT NULL,
          created_at TIMESTAMPTZ DEFAULT NOW(). Create post_tags junction table with
          post_id INTEGER REFERENCES posts(id) ON DELETE CASCADE,
          tag_id INTEGER REFERENCES tags(id) ON DELETE CASCADE,
          PRIMARY KEY (post_id, tag_id).
      - path: src/routes/tags.ts
        isNew: true
        change: >
          Create Express Router with five routes: GET /api/tags (list all tags with post count
          via LEFT JOIN post_tags GROUP BY), POST /api/tags (requireAuth, create tag, return 201,
          reject duplicate name with 409), POST /api/posts/:postId/tags (requireAuth, accept
          {tagId}, tag a post, return 201), DELETE /api/posts/:postId/tags/:tagId (requireAuth,
          remove tag from post, return 204), GET /api/posts/:postId/tags (list all tags for a post).
          Export router as default.
      - path: test/tags.test.ts
        isNew: true
        change: >
          Test file on port 3465 that imports and mounts the tags router directly.
          Tests: create tag, list tags with counts, tag a post, list tags for post,
          remove tag from post, reject duplicate tag name (409).
    tests:
      - test/tags.test.ts
    verify: "bun run src/migrate.ts && bun test test/tags.test.ts"
    mirror: "src/routes/posts.ts"
    context: |
      // src/routes/posts.ts — pattern for CRUD router
      import { Router, type Request, type Response } from "express";
      import { pool } from "../db.js";
      import { requireAuth } from "../middleware/auth.js";

      export const postsRouter = Router();

      postsRouter.post("/", requireAuth, async (req: Request, res: Response) => {
        const { title, body } = req.body;
        const { rows } = await pool.query(
          "INSERT INTO posts (title, body, user_id) VALUES ($1, $2, $3) RETURNING *",
          [title, body, req.user!.userId],
        );
        res.status(201).json(rows[0]);
      });

      postsRouter.delete("/:id", requireAuth, async (req: Request, res: Response) => {
        const { rows } = await pool.query("DELETE FROM posts WHERE id = $1 RETURNING *", [req.params.id]);
        if (rows.length === 0) { res.status(404).json({ error: "Post not found" }); return; }
        res.status(204).send();
      });

      // migrations/002_create_posts.sql — migration pattern
      CREATE TABLE IF NOT EXISTS posts (
        id SERIAL PRIMARY KEY,
        title TEXT NOT NULL,
        body TEXT NOT NULL,
        user_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        created_at TIMESTAMPTZ DEFAULT NOW()
      );

      // test/posts.test.ts — test pattern (port 3458, bun:test, beforeAll migrations + server)
      import { describe, it, expect, beforeAll, afterAll, beforeEach } from "bun:test";
      import { pool } from "../src/db.js";
      import { app } from "../src/app.js";
      const PORT = 3458;
      beforeAll(async () => { /* run migrations, start server */ });
      beforeEach(async () => { await pool.query("TRUNCATE posts RESTART IDENTITY CASCADE"); });
    conventions: >
      ESM imports with .js extensions. Named exports for routers (postsRouter, authRouter) but tags
      should use default export per plan. bun:test framework with describe/it/expect. pool.query for
      SQL with parameterized $N placeholders. requireAuth middleware from ../middleware/auth.js.
      req.user!.userId and req.user!.role available after requireAuth. Migrations use
      CREATE TABLE IF NOT EXISTS. Tests run migrations in beforeAll, truncate in beforeEach,
      use unique ports per test file. fetch-based HTTP testing (no supertest).
    proof: >
      The test suite must verify: (1) POST /api/tags with valid auth creates a tag and returns 201
      with the tag object including id, name, created_at. (2) POST /api/tags with a duplicate name
      returns 409. (3) GET /api/tags returns an array of all tags, each including a post_count field
      from the LEFT JOIN on post_tags. (4) POST /api/posts/:postId/tags with {tagId} and valid auth
      creates the association and returns 201. (5) GET /api/posts/:postId/tags returns an array of
      tags associated with that post. (6) DELETE /api/posts/:postId/tags/:tagId with valid auth
      removes the association and returns 204. (7) POST /api/tags and POST /api/posts/:postId/tags
      without auth token return 401.
    proof_type: "test"

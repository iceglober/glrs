      // export function requireAuth(req: Request, res: Response, next: NextFunction): void
    conventions: "ESM imports with .js extensions, named exports for routers (e.g. postsRouter), default export requested for tags router, bun:test with describe/it/expect, Express Router pattern, pool.query for SQL, requireAuth middleware for protected routes, TRUNCATE + re-register pattern in beforeEach, each test file uses a unique port"
    proof: |
      The acceptance proof should verify all six behaviors:
      1. POST /api/tags with {name} creates a tag and returns 201 with the tag object (id, name, created_at)
      2. POST /api/tags with a duplicate name returns 409
      3. GET /api/tags returns all tags, each with a post_count field reflecting the number of associated posts
      4. POST /api/posts/:postId/tags with {tagId} creates a post-tag association and returns 201
      5. GET /api/posts/:postId/tags returns all tags for the given post
      6. DELETE /api/posts/:postId/tags/:tagId removes the association and returns 204
      All mutating endpoints must require authentication (401 without token). Tests should set up a user, auth token, and at least one post in beforeEach.
    proof_type: "test"

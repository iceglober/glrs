items:
  - id: "3.1"
    intent: "Create src/routes/analytics.ts with three admin-only reporting endpoints — GET /api/analytics/overview returns {total_users, total_posts, posts_last_7_days, posts_last_30_days, avg_posts_per_user} via a single CTE; GET /api/analytics/top-authors?limit=N returns [{user_id, name, email, post_count, latest_post_at}] ordered by post_count DESC (default limit 10) via JOIN + GROUP BY; GET /api/analytics/activity?days=N returns daily {date, new_users, new_posts} for the last N days (default 30) using generate_series so zero-activity days are still present. All three are protected by requireAdmin. Mount the router at /api/analytics in src/app.ts. Create test/analytics.test.ts that registers an admin (UPDATE users SET role='admin'), registers two regular users, creates posts, then asserts overview counts, top-authors ordering, activity daily breakdown, plus 403 for non-admin and 401 for unauthenticated."
    checked: true
    files:
      - path: src/routes/analytics.ts
        isNew: true
        change: "New file. Export analyticsRouter = Router(). All three handlers wrapped with requireAdmin from ../middleware/auth.js. (a) GET '/overview': single CTE query computing total_users (SELECT count(*) FROM users), total_posts (SELECT count(*) FROM posts), posts_last_7_days (SELECT count(*) FROM posts WHERE created_at >= NOW() - INTERVAL '7 days'), posts_last_30_days (same with 30 days), avg_posts_per_user (total_posts::float / NULLIF(total_users, 0)); respond with res.json({total_users, total_posts, posts_last_7_days, posts_last_30_days, avg_posts_per_user}). (b) GET '/top-authors': limit = clamp(parseInt(req.query.limit as string) || 10, 1, 100). Query: SELECT u.id AS user_id, u.name, u.email, COUNT(p.id)::int AS post_count, MAX(p.created_at) AS latest_post_at FROM users u LEFT JOIN posts p ON p.user_id = u.id GROUP BY u.id, u.name, u.email ORDER BY post_count DESC, u.id ASC LIMIT $1; respond rows array. (c) GET '/activity': days = clamp(parseInt(req.query.days as string) || 30, 1, 365). Query uses generate_series(CURRENT_DATE - ($1 - 1)::int, CURRENT_DATE, INTERVAL '1 day') AS d(date) LEFT JOIN counts of new users and new posts grouped by date(created_at); coalesce missing counts to 0. Respond array of {date, new_users, new_posts} sorted by date ASC."
      - path: src/app.ts
        isNew: false
        change: "Import { analyticsRouter } from './routes/analytics.js' and add app.use('/api/analytics', analyticsRouter) alongside the existing user/posts/auth router mounts."
      - path: test/analytics.test.ts
        isNew: true
        change: "New integration test. Mirror test/posts.test.ts setup: PORT=3460 (unique), BASE = http://localhost:${PORT}/api/analytics, AUTH_BASE = http://localhost:${PORT}/api/auth. beforeAll runs migrations and starts app on PORT. beforeEach TRUNCATEs users + posts CASCADE, then registers three users via /api/auth/register; promotes the first one to admin via UPDATE users SET role='admin' WHERE id=$1 and stores its token as adminToken; stores the other two tokens (userToken/userToken2). Insert posts directly via pool.query so counts are deterministic — e.g. give admin 3 posts, user2 5 posts, user3 1 post, with a couple of older created_at (>=7 days ago) to exercise window filters. Tests: (1) GET /overview with admin Bearer returns 200 with total_users=3, total_posts=9, numeric posts_last_7_days/posts_last_30_days, and avg_posts_per_user=3. (2) GET /top-authors with admin returns array sorted by post_count DESC, first user_id is the one with the most posts and includes name/email/latest_post_at fields. (3) GET /top-authors?limit=1 returns exactly 1 entry. (4) GET /activity?days=7 returns 7 daily rows with date/new_users/new_posts fields, zero-activity days present with new_posts=0. (5) GET any endpoint with non-admin Bearer returns 403 {error: 'Admin access required'}. (6) GET any endpoint with no Authorization header returns 401 {error: 'Authentication required'}."
    tests:
      - "test/analytics.test.ts"
    verify: "bun test test/analytics.test.ts"
    mirror: "src/routes/posts.ts"
    context: |
      // src/app.ts — analyticsRouter must be imported and mounted next to existing routers.
      import { analyticsRouter } from "./routes/analytics.js";
      app.use("/api/analytics", analyticsRouter);

      // src/routes/posts.ts (mirror for Router shape, ESM imports, requireAuth usage)
      import { Router, type Request, type Response } from "express";
      import { pool } from "../db.js";
      import { requireAuth } from "../middleware/auth.js";
      export const postsRouter = Router();
      postsRouter.post("/", requireAuth, async (req: Request, res: Response) => { /* ... */ });

      // src/middleware/auth.ts (from wave 1) provides:
      //   export function requireAuth(req: Request, res: Response, next: NextFunction): void;
      //   export function requireAdmin(req: Request, res: Response, next: NextFunction): void;
      // requireAdmin chains requireAuth → 403 {error: 'Admin access required'} when role !== 'admin'.

      // test/posts.test.ts setup (mirror for analytics test)
      const PORT = 3458;                                   // analytics uses 3460
      const BASE = `http://localhost:${PORT}/api/posts`;
      const AUTH_BASE = `http://localhost:${PORT}/api/auth`;
      beforeAll(async () => {
        // Run all migrations/*.sql in lexical order
        // app.listen(PORT) then await 'listening'
      });
      beforeEach(async () => {
        await pool.query("TRUNCATE posts RESTART IDENTITY CASCADE");
        await pool.query("TRUNCATE users RESTART IDENTITY CASCADE");
        const res = await fetch(`${AUTH_BASE}/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: "Alice", email: "alice@example.com", password: "password123" }),
        });
        const data = await res.json();
        // analytics test additionally: await pool.query("UPDATE users SET role='admin' WHERE id=$1", [data.user.id]);
        // then re-login or rely on requireAdmin re-reading role from DB on each request.
      });
    conventions: "ESM imports with .js extension on relative paths; named exports; express Router with typed Request/Response from 'express'; pg pool via parameterized queries ($1, $2, ...); clamp numeric query params with Math.min/Math.max; respond via res.status(...).json({...}) then return — never throw from handlers; requireAdmin from ../middleware/auth.js chains requireAuth and 403s non-admins; bun:test (describe/it/expect/beforeAll/afterAll/beforeEach) per file on a unique port (3457 users, 3458 posts, prior waves added more — pick 3460 for analytics); TRUNCATE ... RESTART IDENTITY CASCADE in beforeEach; SQL is dialect-Postgres (CTEs, generate_series, INTERVAL literals, date_trunc) and is fine to inline in handler strings."
    proof: "(1) GET /api/analytics/overview with admin Bearer token returns 200 and a body whose keys are exactly {total_users, total_posts, posts_last_7_days, posts_last_30_days, avg_posts_per_user}, with total_users === number of registered users and total_posts === number of inserted posts. (2) GET /api/analytics/top-authors with admin Bearer returns an array sorted by post_count DESC, each element has user_id, name, email, post_count (number), latest_post_at; limit defaults to 10 and ?limit=N caps length. (3) GET /api/analytics/activity?days=7 returns 7 entries (one per day), each shaped {date, new_users, new_posts}; days with no new rows still appear with zeroed counts (proves generate_series LEFT JOIN). (4) GET on any of the three endpoints without an Authorization header returns 401 {error: 'Authentication required'}. (5) GET on any of the three endpoints with a non-admin Bearer token returns 403 {error: 'Admin access required'}. (6) Router is mounted at /api/analytics in src/app.ts — fetch resolves the handler rather than 404."
    proof_type: "test"
  - id: "3.2"
    intent: "Run the full regression suite via `bun test` and ensure every test file (users, posts, auth, search, pagination, analytics) passes. If any test fails, read the failing test file plus the source it exercises, diagnose the root cause, and fix the underlying source or assertion — do not skip, comment out, or delete failing tests. Wave is complete only when `bun test` exits 0."
    checked: true
    files:
      - path: test/users.test.ts
        isNew: false
        change: "Modify only if a failure is rooted here — e.g. an envelope assertion that still expects a bare array, an outdated header shape, or a stale fixture. Otherwise leave untouched."
      - path: test/posts.test.ts
        isNew: false
        change: "Modify only if a failure is rooted here — e.g. an envelope assertion that still expects a bare array, missing Authorization header on a mutation, or a stale post-body field. Otherwise leave untouched."
      - path: test/auth.test.ts
        isNew: false
        change: "Modify only if a failure is rooted here — e.g. token format drift, role default mismatch, or schema-driven JSON-shape change. Otherwise leave untouched."
      - path: test/analytics.test.ts
        isNew: false
        change: "Modify only if a failure is rooted here — typically count expectations that depend on the exact fixture set or window boundaries. Prefer adjusting source/SQL if the production behavior is wrong."
    tests:
      - "test/users.test.ts"
      - "test/posts.test.ts"
      - "test/auth.test.ts"
      - "test/analytics.test.ts"
    verify: "bun test"
    mirror: "test/posts.test.ts"
    context: |
      // Test files all follow the same pattern (mirror for diagnosis):
      // - unique PORT per file (3457 users, 3458 posts, ... new wave files pick further ports)
      // - beforeAll runs every migrations/*.sql in lexical order against the shared pool
      // - beforeEach TRUNCATEs and re-registers an authenticated user via /api/auth/register
      // - mutations send Authorization: Bearer <token>
      // - list endpoints return the {data, next_cursor, has_more} envelope from wave 2 — bare-array
      //   assertions left over from wave 0 are a common failure mode and need to unwrap body.data.
      //
      // Common failure causes to check first:
      //   - GET /api/users or /api/posts assertions still call expect(body).toHaveLength(...) instead
      //     of expect(body.data).toHaveLength(...); fix the test to use the envelope.
      //   - Analytics counts off-by-one because of created_at boundary handling: prefer adjusting the
      //     SQL window (e.g. >= NOW() - INTERVAL '7 days') over loosening the assertion.
      //   - Search test depends on the trigger backfilling search_vector — ensure migrations are run
      //     before the test inserts rows directly via pool.query (the trigger fires on those inserts).
    conventions: "Diagnose before editing — read the failing assertion, then the route/SQL, then decide whether the source or the test is wrong; never use test.skip / test.todo / it.only / .skip to silence failures; never delete a failing test; preserve the bun:test (describe/it/expect/beforeAll/afterAll/beforeEach) structure and per-file port discipline; keep ESM .js relative imports; if a source fix is required, prefer minimal diffs to the route or SQL rather than restructuring."
    proof: "Running `bun test` from the project root exits with status 0. Every test file from prior waves (test/users.test.ts, test/posts.test.ts, test/auth.test.ts, test/auth-middleware.test.ts, test/auth-protected.test.ts, test/search.test.ts, test/pagination.test.ts) and the new test/analytics.test.ts each report 'pass' for every assertion. No test was disabled, skipped, .only'd, marked .todo, deleted, or rewritten to weaken its assertion — git diff against the wave-2 tip shows only fixes to source files or to genuinely outdated test expectations (e.g. envelope unwrapping). The test runner summary shows fail: 0."
    proof_type: "test"

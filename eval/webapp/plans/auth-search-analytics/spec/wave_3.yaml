items:
  - id: "3.1"
    intent: "Create src/routes/analytics.ts with three admin-protected reporting endpoints and mount at /api/analytics. (a) GET /api/analytics/overview returns {total_users, total_posts, posts_last_7_days, posts_last_30_days, avg_posts_per_user} via a single CTE-based SQL query. (b) GET /api/analytics/top-authors?limit=N (default 10) returns [{user_id, name, email, post_count, latest_post_at}] from users LEFT JOIN posts GROUP BY user, ORDER BY post_count DESC. (c) GET /api/analytics/activity?days=N (default 30) returns [{date, new_users, new_posts}] using generate_series so zero-activity days still appear. All endpoints require requireAdmin."
    checked: true
    files:
      - path: src/routes/analytics.ts
        isNew: true
        change: "New router module. Export `analyticsRouter`. Apply `requireAdmin` middleware on every handler. Use `pool.query` from ../db.js with parameterised pg positional params for limit/days. Overview: single SQL with CTEs combining COUNT(*) FROM users, COUNT(*) FROM posts, COUNT(*) FILTER (WHERE created_at > NOW() - INTERVAL '7 days') FROM posts, same for 30, and an avg posts/user computation. Top-authors: SELECT u.id AS user_id, u.name, u.email, COUNT(p.id)::int AS post_count, MAX(p.created_at) AS latest_post_at FROM users u LEFT JOIN posts p ON p.user_id = u.id GROUP BY u.id ORDER BY post_count DESC LIMIT $1. Activity: WITH days AS (SELECT generate_series((NOW() - ($1 || ' days')::interval)::date, NOW()::date, '1 day') AS date) LEFT JOIN counts subqueries for users and posts grouped by created_at::date."
      - path: src/app.ts
        isNew: false
        change: "Import { analyticsRouter } from './routes/analytics.js' and app.use('/api/analytics', analyticsRouter) alongside the other route mounts."
    tests:
      - "test/analytics.test.ts"
    verify: "bun test test/analytics.test.ts"
    mirror: "src/routes/posts.ts"
    context: |
      // src/app.ts — current mount block (3.1 only needs to add the analytics line):
      //   import { usersRouter } from "./routes/users.js";
      //   import { postsRouter } from "./routes/posts.js";
      //   import { authRouter } from "./routes/auth.js";
      //   app.use("/api/users", usersRouter);
      //   app.use("/api/posts", postsRouter);
      //   app.use("/api/auth", authRouter);
      //
      // src/routes/posts.ts — handler shape to mirror (router + pool.query + res.json):
      //   import { Router, type Request, type Response } from "express";
      //   import { pool } from "../db.js";
      //   import { requireAuth } from "../middleware/auth.js";
      //   export const postsRouter = Router();
      //   postsRouter.get("/", async (req: Request, res: Response) => {
      //     const { rows } = await pool.query(SQL, [params]);
      //     res.json(rows);
      //   });
      //
      // wave_1 produced src/middleware/auth.ts exporting requireAdmin which
      // attaches req.user = {userId, role} and short-circuits with 401/403.
      //
      // Schema reminders (from migrations 001/002/003):
      //   users(id, name, email, password_hash, role, created_at)
      //   posts(id, title, body, user_id, created_at)
    conventions: "ESM imports with .js suffix on relative paths; named exports; Router from 'express'; typed Request/Response; positional pg parameters ($1, $2); error responses res.status(N).json({error: '...'}) and return; lowercase snake_case JSON keys."
    proof: "Tests in test/analytics.test.ts pass with admin token. GET /api/analytics/overview returns an object with the five numeric keys total_users, total_posts, posts_last_7_days, posts_last_30_days, avg_posts_per_user reflecting seeded data. GET /api/analytics/top-authors returns an array sorted by post_count descending, each element having user_id, name, email, post_count (number), latest_post_at (ISO string or null). GET /api/analytics/activity?days=N returns N+1 (or N) elements one per day, each {date, new_users, new_posts}, including days where both counts are 0. Mounted under /api/analytics in src/app.ts."
    proof_type: "test"

  - id: "3.2"
    intent: "Create test/analytics.test.ts. Setup: register one user and promote it to admin via UPDATE users SET role='admin' WHERE id=... in beforeAll; register 2 regular users; seed 5 posts across the regular users with explicit created_at timestamps via SQL INSERT. Tests: (a) /overview returns correct counts (total_users=3, total_posts=5, posts_last_7_days/posts_last_30_days reflect the inserted timestamps, avg_posts_per_user = 5/3); (b) /top-authors returns the regular users sorted by post_count desc; (c) /activity returns daily breakdown over the requested window including zero-activity days; (d) any analytics endpoint hit by a non-admin token returns 403; (e) any analytics endpoint hit without an Authorization header returns 401."
    checked: true
    files:
      - path: test/analytics.test.ts
        isNew: true
        change: "New bun:test integration test. Follows the same harness as test/posts.test.ts: import { app } from '../src/app.js', listen on a unique PORT (e.g. 3461), apply migrations in beforeAll, TRUNCATE users, posts, sessions RESTART IDENTITY CASCADE in beforeEach. Register admin via POST /api/auth/register then `UPDATE users SET role='admin' WHERE id=$1`; capture adminToken. Register two regular users for regularToken usage. Seed posts with raw INSERT to control created_at across the 7/30 day boundaries. Use fetch against `http://localhost:PORT/api/analytics/...` with Authorization: Bearer headers."
    tests:
      - "test/analytics.test.ts"
    verify: "bun test test/analytics.test.ts"
    mirror: "test/posts.test.ts"
    context: |
      // test/posts.test.ts harness shape to mirror:
      //   import { describe, it, expect, beforeAll, afterAll, beforeEach } from "bun:test";
      //   import { pool } from "../src/db.js";
      //   import { app } from "../src/app.js";
      //   const PORT = 3458; // analytics test must pick a NEW unused port
      //   beforeAll(async () => { /* run every *.sql migration */ ; server = app.listen(PORT) });
      //   afterAll(async () => server.close());
      //   beforeEach(async () => {
      //     await pool.query("TRUNCATE posts RESTART IDENTITY CASCADE");
      //     await pool.query("TRUNCATE users RESTART IDENTITY CASCADE");
      //     // register + capture token
      //   });
      //
      // Auth flow (from wave_0): POST /api/auth/register {name,email,password}
      // returns {token, user:{id,...}}. Role defaults to 'user'; promote with
      //   await pool.query("UPDATE users SET role='admin' WHERE id=$1", [id]);
      //
      // Posts can be seeded with controlled timestamps via:
      //   INSERT INTO posts (title, body, user_id, created_at)
      //     VALUES ($1,$2,$3,$4) RETURNING *
    conventions: "bun:test imports (describe/it/expect/beforeAll/afterAll/beforeEach); fetch against a locally-listening Express server on a unique PORT (3457 users, 3458 posts — pick the next free one); pool.query for DB seeding; ESM imports with .js suffix; Authorization: `Bearer ${token}` header."
    proof: "`bun test test/analytics.test.ts` passes. The suite covers: (a) overview counts match seeded data (3 users, 5 posts, plus 7-/30-day windowed counts and avg_posts_per_user); (b) top-authors sorted by post_count desc with the right user_ids and latest_post_at; (c) activity includes days with zero new_users and zero new_posts (proving generate_series is wired); (d) non-admin token gets HTTP 403 on /overview, /top-authors, /activity; (e) missing Authorization gets HTTP 401."
    proof_type: "test"

  - id: "3.3"
    intent: "Run the full `bun test` regression. Every test file (users, posts, auth, auth-middleware, auth-protected, search, pagination, analytics) must pass. If any fails, read the test file and source under test, diagnose the root cause, and fix the implementation or the assertion to be correct — never skip, comment out, or delete a failing test."
    checked: true
    files:
      - path: test/users.test.ts
        isNew: false
        change: "Modify only if a real bug is discovered (e.g. an outdated assertion against an old response shape from earlier waves)."
      - path: test/posts.test.ts
        isNew: false
        change: "Modify only if a real bug is discovered."
      - path: test/auth.test.ts
        isNew: false
        change: "Modify only if a real bug is discovered."
      - path: test/analytics.test.ts
        isNew: false
        change: "Modify only if a real bug is discovered."
    tests:
      - "test/users.test.ts"
      - "test/posts.test.ts"
      - "test/auth.test.ts"
      - "test/analytics.test.ts"
    verify: "bun test"
    mirror: "test/posts.test.ts"
    context: |
      // Full project test inventory after this wave:
      //   test/users.test.ts             (wave 0 baseline + 2.3 envelope)
      //   test/posts.test.ts             (wave 0 baseline + 2.3 envelope)
      //   test/auth.test.ts              (wave 0 auth registration/login)
      //   test/auth-middleware.test.ts   (wave 1 requireAuth/requireAdmin)
      //   test/auth-protected.test.ts    (wave 1 mutation guards)
      //   test/search.test.ts            (wave 2 full-text search)
      //   test/pagination.test.ts        (wave 2 cursor pagination)
      //   test/analytics.test.ts         (wave 3 reporting)
      //
      // Each test file picks its own PORT and runs migrations in beforeAll
      // by replaying every *.sql in migrations/ alphabetically. Truncate
      // patterns vary — some do `TRUNCATE posts, users RESTART IDENTITY
      // CASCADE`, some do them sequentially; both work because of CASCADE.
      //
      // Common failure modes to expect: stale bare-array assertions left
      // from before wave 2.3, missing TRUNCATE of `sessions` between tests,
      // and tests that hard-code user_id values (now derived from
      // req.user.userId after wave 1.2).
    conventions: "Fix the source of truth, not the symptom: if behaviour changed by design, update the assertion; if behaviour regressed, fix the route/middleware. Never use it.skip, xit, .only, or delete tests. Keep PORT numbers unique across test files."
    proof: "`bun test` (no filter) exits 0 with every test file's suite green: users, posts, auth, auth-middleware, auth-protected, search, pagination, analytics. No skipped or todo tests. Any test that previously passed still passes — no regressions introduced while fixing later tests."
    proof_type: "test"

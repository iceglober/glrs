items:
  - id: "3.1"
    intent: "Create src/routes/analytics.ts with three admin-only reporting endpoints (overview, top-authors, activity), mount at /api/analytics in app.ts, write integration tests in test/analytics.test.ts, and verify all test files pass (bun test)"
    checked: true
    files:
      - path: src/routes/analytics.ts
        isNew: true
        change: "New Router with GET /api/analytics/overview (CTE-based aggregate), GET /api/analytics/top-authors?limit=N (JOIN + GROUP BY), GET /api/analytics/activity?days=N (generate_series for zero-fill); all routes guarded by requireAdmin"
      - path: src/app.ts
        isNew: false
        change: "Already imports and mounts analyticsRouter at /api/analytics — verify the import path resolves once the file is created"
      - path: test/analytics.test.ts
        isNew: true
        change: "Integration tests: register admin (UPDATE role='admin'), register 2 regular users, create posts; assert overview counts, top-authors sorted DESC, activity daily breakdown, non-admin 403, unauthenticated 401"
      - path: test/users.test.ts
        isNew: false
        change: "Fix or adjust any assertions broken by schema/middleware changes introduced in earlier waves"
      - path: test/posts.test.ts
        isNew: false
        change: "Fix or adjust any assertions broken by schema/middleware changes introduced in earlier waves"
      - path: test/auth.test.ts
        isNew: false
        change: "Fix or adjust any assertions broken by schema/middleware changes introduced in earlier waves"
    tests:
      - "test/analytics.test.ts"
      - "test/users.test.ts"
      - "test/posts.test.ts"
      - "test/auth.test.ts"
    verify: "bun test"
    mirror: "src/routes/posts.ts"
    context: |
      // src/routes/posts.ts — Router pattern used by all route files
      import { Router, type Request, type Response } from "express";
      import { pool } from "../db.js";
      import { requireAuth } from "../middleware/auth.js";

      export const postsRouter = Router();

      postsRouter.post("/", requireAuth, async (req: Request, res: Response) => {
        const { rows } = await pool.query(
          "INSERT INTO posts (title, body, user_id) VALUES ($1, $2, $3) RETURNING *",
          [title, body, req.user!.userId],
        );
        res.status(201).json(rows[0]);
      });

      // src/routes/users.ts — admin role check pattern
      usersRouter.delete("/:id", requireAuth, async (req: Request, res: Response) => {
        if (req.user!.userId !== targetId && req.user!.role !== "admin") {
          res.status(403).json({ error: "Forbidden" });
          return;
        }
      });

      // src/app.ts — analytics already mounted
      import { analyticsRouter } from "./routes/analytics.js";
      app.use("/api/analytics", analyticsRouter);
    conventions: "ESM imports with .js extensions on local paths; named Router exports (e.g. `export const analyticsRouter = Router()`); bun:test with describe/it/expect/beforeAll/afterAll/beforeEach; pool.query for all DB access; req.user!.userId and req.user!.role from auth middleware; no default exports"
    proof: "test/analytics.test.ts must: (1) assert GET /api/analytics/overview returns an object with numeric keys total_users, total_posts, posts_last_7_days, posts_last_30_days, avg_posts_per_user matching seeded data; (2) assert GET /api/analytics/top-authors returns an array sorted by post_count DESC with user_id, name, email, post_count, latest_post_at fields; (3) assert GET /api/analytics/activity?days=7 returns an array of 7 objects each with date, new_users, new_posts (zero-filled days present); (4) assert non-admin token gets 403 on all three endpoints; (5) assert missing token gets 401 on all three endpoints; all other test files must still pass with 0 failures"
    proof_type: "test"

items:
  - id: "1.1"
    intent: "Create src/middleware/auth.ts exporting requireAuth and requireAdmin; apply requireAuth to all mutating endpoints on users and posts routers; enforce self-or-admin on DELETE /api/users/:id; auto-set posts.user_id from req.user.userId; update test/users.test.ts and test/posts.test.ts to register a user via /api/auth/register and pass Authorization: Bearer <token> on mutations while keeping GETs public."
    checked: true
    files:
      - path: src/middleware/auth.ts
        isNew: true
        change: "New file. Declaration-merge express-serve-static-core's Request to add user?: {userId: number, role: string}. Export requireAuth(req, res, next): parse Authorization header, expect 'Bearer <token>', call verifyToken from ../auth.js; on missing/invalid token respond 401 {error: 'Authentication required'}; on success look up user row to attach req.user = {userId, role} and call next(). Export requireAdmin(req, res, next) that chains requireAuth then checks req.user?.role === 'admin'; otherwise respond 403 {error: 'Admin access required'}."
      - path: src/routes/users.ts
        isNew: false
        change: "Import requireAuth from ../middleware/auth.js. Add requireAuth to POST '/', PUT '/:id', DELETE '/:id'. In DELETE handler, before running the query, enforce: if Number(req.params.id) !== req.user!.userId && req.user!.role !== 'admin' -> res.status(403).json({error: 'Forbidden'}) and return. GET '/' and GET '/:id' remain public."
      - path: src/routes/posts.ts
        isNew: false
        change: "Import requireAuth from ../middleware/auth.js. Add requireAuth to POST '/', PUT '/:id', DELETE '/:id'. In POST '/' handler, drop user_id from req.body and use req.user!.userId in the INSERT instead (INSERT INTO posts (title, body, user_id) VALUES ($1, $2, $3))."
      - path: test/users.test.ts
        isNew: false
        change: "Add AUTH_BASE constant. In beforeAll (or beforeEach after TRUNCATE) POST to /api/auth/register with {name, email, password} to obtain {token, user:{id}}; store as authToken/authUserId. Add 'Authorization: Bearer ${authToken}' header to all POST/PUT/DELETE fetch calls. For the DELETE test, delete the authenticated user (authUserId) so the self-rule allows it. GET requests stay unauthenticated. All previously passing assertions must still pass."
      - path: test/posts.test.ts
        isNew: false
        change: "Same pattern as test/users.test.ts: register a user in beforeAll/beforeEach, capture token, send it on every POST/PUT/DELETE. Remove user_id from POST /api/posts request bodies (server derives it from the token). GETs remain unauthenticated."
    tests:
      - "test/users.test.ts"
      - "test/posts.test.ts"
    verify: "bun test test/users.test.ts && bun test test/posts.test.ts"
    mirror: "src/routes/auth.ts"
    context: |
      // src/routes/users.ts (current — to be modified)
      import { Router, type Request, type Response } from "express";
      import { pool } from "../db.js";
      export const usersRouter = Router();

      usersRouter.get("/", async (req, res) => { /* paginated list */ });
      usersRouter.get("/:id", async (req, res) => { /* by id */ });

      // POST /api/users — create
      usersRouter.post("/", async (req: Request, res: Response) => {
        const { name, email } = req.body;
        if (!name || !email) { res.status(400).json({ error: "name and email are required" }); return; }
        const { rows } = await pool.query("INSERT INTO users (name, email) VALUES ($1, $2) RETURNING *", [name, email]);
        res.status(201).json(rows[0]);
      });
      // PUT/DELETE follow the same shape — need requireAuth prepended.
      // DELETE additionally must enforce: Number(req.params.id) === req.user!.userId || req.user!.role === 'admin'.

      // src/routes/posts.ts POST handler (current — to be modified)
      postsRouter.post("/", async (req: Request, res: Response) => {
        const { title, body, user_id } = req.body;          // user_id will be removed
        if (!title || !body || !user_id) { res.status(400).json({ error: "..." }); return; }
        const { rows } = await pool.query(
          "INSERT INTO posts (title, body, user_id) VALUES ($1, $2, $3) RETURNING *",
          [title, body, user_id],
        );
        res.status(201).json(rows[0]);
      });

      // src/auth.ts (existing, from wave 0) provides:
      export function verifyToken(token: string): { userId: number } | null;

      // Pattern for the new middleware (declaration-merging Request):
      declare global {
        namespace Express {
          interface Request {
            user?: { userId: number; role: string };
          }
        }
      }
      export function requireAuth(req, res, next) { /* parse Bearer, verifyToken, attach req.user, else 401 */ }
      export function requireAdmin(req, res, next) { requireAuth(req, res, () => { if (req.user?.role !== 'admin') return res.status(403).json({error: 'Admin access required'}); next(); }); }

      // test/users.test.ts (current shape — needs auth wiring)
      const PORT = 3457;
      const BASE = `http://localhost:${PORT}/api/users`;
      // add: const AUTH_BASE = `http://localhost:${PORT}/api/auth`;
      // add: let authToken: string; let authUserId: number;
      // beforeAll / beforeEach: TRUNCATE then POST {AUTH_BASE}/register {name,email,password} -> {token, user:{id}}
      // mutation requests: headers: { "Content-Type": "application/json", "Authorization": `Bearer ${authToken}` }
    conventions: "ESM imports with .js extension on relative paths; named exports; express Router with typed Request/Response from 'express'; middleware signature (req: Request, res: Response, next: NextFunction); declaration-merge Express.Request via a global namespace block in src/middleware/auth.ts; use req.user! non-null assertion only inside requireAuth-guarded handlers; pg pool via parameterized queries; bun:test (describe/it/expect/beforeAll/afterAll/beforeEach); respond with res.status(...).json({...}) then return; do not throw from handlers."
    proof: "After changes, run `bun test test/users.test.ts && bun test test/posts.test.ts`: all 13 previously passing assertions still pass with auth wiring. Specifically prove (1) POST/PUT/DELETE on /api/users and /api/posts without an Authorization header return 401 {error: 'Authentication required'}; (2) the same requests with a valid Bearer token succeed (201/200/204); (3) GET /api/users, GET /api/users/:id, GET /api/posts, GET /api/posts/:id still respond 200/404 without any auth header; (4) POST /api/posts no longer requires user_id in the body — the inserted row's user_id equals the authenticated user's id; (5) DELETE /api/users/:id where :id !== authenticated userId and the caller is not admin returns 403 {error: 'Forbidden'}, while deleting one's own id returns 204; (6) req.user is typed as {userId: number, role: string} (type-check via tsc passes)."
    proof_type: "test"

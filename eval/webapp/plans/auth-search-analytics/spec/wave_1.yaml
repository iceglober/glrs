items:
  - id: "1.1"
    intent: "Create src/middleware/auth.ts exporting requireAuth (reads Authorization: Bearer header, calls verifyToken, attaches req.user = {userId, role}; returns 401 on missing or invalid token) and requireAdmin (runs requireAuth then verifies req.user.role === 'admin'; returns 403 otherwise). Extend Express Request type via declaration merging to add user?: {userId: number, role: string}."
    checked: true
    files:
      - path: src/middleware/auth.ts
        isNew: true
        change: "New middleware module. Export requireAuth and requireAdmin RequestHandlers. requireAuth parses 'Authorization: Bearer <token>' header, calls verifyToken (from ../auth.js) for {userId}, looks up user role from the users table (or sessions join) and assigns req.user = {userId, role}. requireAdmin calls requireAuth then checks req.user.role === 'admin'. Add a `declare global { namespace Express { interface Request { user?: {userId: number, role: string} } } }` augmentation."
    tests:
      - "test/auth-middleware.test.ts"
    verify: "bun test test/auth-middleware.test.ts"
    mirror: "src/routes/users.ts"
    context: |
      // src/auth.ts (from wave 0) exports:
      //   verifyToken(token: string): {userId: number} | null
      //
      // Routes already expect req.user to exist:
      //   src/routes/users.ts:
      //     usersRouter.delete("/:id", requireAuth, async (req, res) => {
      //       const targetId = Number(req.params.id);
      //       if (req.user!.userId !== targetId && req.user!.role !== "admin") {
      //         res.status(403).json({ error: "Forbidden" });
      //         return;
      //       }
      //       ...
      //     });
      //   src/routes/posts.ts:
      //     postsRouter.post("/", requireAuth, async (req, res) => {
      //       ...
      //       "INSERT INTO posts (title, body, user_id) VALUES ($1, $2, $3) RETURNING *",
      //       [title, body, req.user!.userId],
      //     });
      //
      // src/db.ts exports `pool` (pg Pool) — use pool.query to load the role.
    conventions: "ESM imports with .js suffix on relative paths; named exports; TypeScript strict; Express RequestHandler/Request/Response types from 'express'; error responses use res.status(N).json({error: '...'}); return after sending."
    proof: "Tests verify: (a) request without Authorization header returns 401 with {error: 'Authentication required'}; (b) request with malformed/invalid token returns 401; (c) request with a valid token populates req.user with {userId, role} and reaches the next handler; (d) requireAdmin returns 403 with {error: 'Admin access required'} when role !== 'admin'; (e) requireAdmin passes through when role === 'admin'. TypeScript compiles with req.user typed as {userId: number, role: string} | undefined."
    proof_type: "test"

  - id: "1.2"
    intent: "Protect mutation endpoints with requireAuth. All POST/PUT/DELETE handlers in users and posts routers require a valid Bearer token; GET handlers remain public. POST /api/posts derives user_id from req.user.userId (no longer accepts user_id in body). DELETE /api/users/:id only succeeds if req.user.userId === :id OR req.user.role === 'admin' (else 403)."
    checked: true
    files:
      - path: src/routes/users.ts
        isNew: false
        change: "Import requireAuth from '../middleware/auth.js'. Add requireAuth as second arg to usersRouter.post('/'), usersRouter.put('/:id'), usersRouter.delete('/:id'). In the DELETE handler, compare Number(req.params.id) against req.user!.userId and req.user!.role; return 403 {error: 'Forbidden'} if neither self nor admin."
      - path: src/routes/posts.ts
        isNew: false
        change: "Import requireAuth from '../middleware/auth.js'. Add requireAuth on POST/PUT/DELETE. In POST handler, drop user_id from the body destructuring; insert with req.user!.userId as the third parameter."
    tests:
      - "test/auth-protected.test.ts"
    verify: "bun test test/auth-protected.test.ts"
    mirror: "src/routes/users.ts"
    context: |
      // src/routes/posts.ts current POST handler signature (pre-protection):
      //   postsRouter.post("/", async (req, res) => {
      //     const { title, body, user_id } = req.body;
      //     ...
      //     "INSERT INTO posts (title, body, user_id) VALUES ($1, $2, $3) RETURNING *",
      //     [title, body, user_id],
      //   });
      //
      // Target shape (per wave 1):
      //   postsRouter.post("/", requireAuth, async (req, res) => {
      //     const { title, body } = req.body;
      //     ...
      //     "INSERT INTO posts (title, body, user_id) VALUES ($1, $2, $3) RETURNING *",
      //     [title, body, req.user!.userId],
      //   });
      //
      // GET handlers (list, /:id, /search) remain untouched.
    conventions: "Middleware passed as second argument to router.METHOD(); req.user! non-null assertion permitted after requireAuth; error shape {error: '...'}; status set via res.status().json(); return after responding."
    proof: "Integration tests confirm: POST/PUT/DELETE on /api/users and /api/posts without a token return 401; GET endpoints on both routers return 200 without a token. POST /api/posts with a valid token writes a row whose user_id matches the token's userId, ignoring any user_id sent in the request body. DELETE /api/users/:id returns 403 when the authenticated user is neither the target nor an admin; succeeds (204) when deleting self; succeeds when caller has role 'admin' deleting another user."
    proof_type: "test"

  - id: "1.3"
    intent: "Update test/users.test.ts and test/posts.test.ts so existing 13 tests pass with auth protection. Register a test user via POST /api/auth/register in beforeAll/beforeEach, capture the token, and include 'Authorization: Bearer <token>' on all POST/PUT/DELETE requests. GET requests stay unauthenticated."
    checked: true
    files:
      - path: test/users.test.ts
        isNew: false
        change: "Add AUTH_BASE constant. In beforeEach (after TRUNCATE), POST to /api/auth/register with a fixed user (e.g. Bob/bob@example.com/password123); store data.token and data.user.id. Add 'Authorization: Bearer <token>' header to every POST/PUT/DELETE fetch in this file. Update the GET-list test expectation to include the seeded user. Update the DELETE test to target the authenticated user (self-delete)."
      - path: test/posts.test.ts
        isNew: false
        change: "Same auth setup as users test. Add Authorization header to POST/PUT/DELETE requests. Replace any explicit user_id in POST bodies with the authenticated user — the server now derives user_id from the token."
    tests:
      - "test/users.test.ts"
      - "test/posts.test.ts"
    verify: "bun test test/users.test.ts && bun test test/posts.test.ts"
    mirror: "test/users.test.ts"
    context: |
      // Existing test/users.test.ts header pattern (already partially updated):
      //   import { describe, it, expect, beforeAll, afterAll, beforeEach } from "bun:test";
      //   import { pool } from "../src/db.js";
      //   import { app } from "../src/app.js";
      //   const PORT = 3457;
      //   const BASE = `http://localhost:${PORT}/api/users`;
      //   const AUTH_BASE = `http://localhost:${PORT}/api/auth`;
      //
      // beforeEach truncates and re-registers:
      //   await pool.query("TRUNCATE posts, users RESTART IDENTITY CASCADE");
      //   const res = await fetch(`${AUTH_BASE}/register`, {
      //     method: "POST",
      //     headers: { "Content-Type": "application/json" },
      //     body: JSON.stringify({ name: "Bob", email: "bob@example.com", password: "password123" }),
      //   });
      //   const data = await res.json();
      //   authToken = data.token;
      //   authUserId = data.user.id;
    conventions: "bun:test (describe/it/expect/beforeAll/afterAll/beforeEach); fetch against an app.listen() server on a fixed port; TRUNCATE ... RESTART IDENTITY CASCADE between tests; JSON request bodies via JSON.stringify with Content-Type: application/json header."
    proof: "Running `bun test test/users.test.ts && bun test test/posts.test.ts` passes all 13 pre-existing tests with no skips. Every mutation request includes Authorization: Bearer <token>; GET requests have no auth header. The users list test accounts for the seeded auth user in its expected length. The users DELETE test deletes the authenticated user's own id and asserts 204."
    proof_type: "test"

items:
  - id: "1.1"
    intent: "Add auth middleware (requireAuth, requireAdmin) with Request type augmentation, protect all mutation endpoints on /api/users and /api/posts, drive POST /api/posts user_id from req.user.userId, restrict DELETE /api/users/:id to self or admin, and update existing users/posts tests to register a user in beforeAll and send a Bearer token with every mutation request."
    checked: true
    files:
      - path: src/middleware/auth.ts
        isNew: true
        change: "Export `requireAuth` and `requireAdmin` RequestHandler functions. `requireAuth` parses `Authorization: Bearer <token>`, calls `verifyToken` from src/auth.js, returns 401 {error:'Authentication required'} if missing/invalid, otherwise sets `req.user = {userId, role}` (role fetched via SELECT role FROM users WHERE id = userId) and calls next(). `requireAdmin` runs requireAuth then checks `req.user.role === 'admin'`, returns 403 {error:'Admin access required'} otherwise. Add `declare global { namespace Express { interface Request { user?: {userId: number, role: string} } } }` for type augmentation."
      - path: src/routes/users.ts
        isNew: false
        change: "Import requireAuth from ../middleware/auth.js. Add requireAuth as middleware on POST /, PUT /:id, DELETE /:id. For DELETE /:id: gate with `if (req.user!.userId !== Number(req.params.id) && req.user!.role !== 'admin') return 403 {error:'Forbidden'}`. GET handlers stay public."
      - path: src/routes/posts.ts
        isNew: false
        change: "Import requireAuth from ../middleware/auth.js. Add requireAuth as middleware on POST /, PUT /:id, DELETE /:id. POST / no longer reads user_id from body; instead reads `req.user!.userId` and inserts that into the user_id column. GET handlers stay public."
      - path: test/users.test.ts
        isNew: false
        change: "Add an `AUTH_BASE` constant and module-level `authToken` / `authUserId`. In beforeEach (after TRUNCATE), POST to /api/auth/register with a fixed user and capture token + id. Add `Authorization: Bearer ${authToken}` header to all POST/PUT/DELETE fetches. GET requests remain unauthenticated. All 13 prior assertions must still pass."
      - path: test/posts.test.ts
        isNew: false
        change: "Same pattern as users test: register a user in beforeEach, send Bearer token on mutations. Remove `user_id` from POST /api/posts bodies (server derives from token). Keep GET requests unauthenticated. All prior assertions must still pass."
    tests:
      - "test/users.test.ts"
      - "test/posts.test.ts"
    verify: "bun test test/users.test.ts && bun test test/posts.test.ts"
    mirror: "src/routes/users.ts"
    context: |
      // src/auth.ts exports (from wave 0)
      export function verifyToken(token: string): { userId: number } | null;

      // src/app.ts mounts (existing)
      app.use("/api/auth", authRouter);
      app.use("/api/users", usersRouter);
      app.use("/api/posts", postsRouter);

      // src/routes/users.ts (current shape — POST/PUT/DELETE need protection)
      import { Router, type Request, type Response } from "express";
      import { pool } from "../db.js";
      export const usersRouter = Router();
      usersRouter.get("/", async (req, res) => { /* paginated list, public */ });
      usersRouter.get("/:id", async (req, res) => { /* public */ });
      usersRouter.post("/", async (req, res) => {
        const { name, email } = req.body;
        if (!name || !email) { res.status(400).json({ error: "name and email are required" }); return; }
        const { rows } = await pool.query("INSERT INTO users (name, email) VALUES ($1, $2) RETURNING *", [name, email]);
        res.status(201).json(rows[0]);
      });
      usersRouter.delete("/:id", async (req, res) => { /* needs self-or-admin gate */ });

      // src/routes/posts.ts — POST currently reads user_id from body; replace with req.user!.userId
      postsRouter.post("/", async (req, res) => {
        const { title, body, user_id } = req.body;
        // becomes: const { title, body } = req.body; ... INSERT ... [title, body, req.user!.userId]
      });

      // test/users.test.ts beforeEach pattern to add
      const AUTH_BASE = `http://localhost:${PORT}/api/auth`;
      let authToken: string;
      let authUserId: number;
      beforeEach(async () => {
        await pool.query("TRUNCATE posts, users RESTART IDENTITY CASCADE");
        const res = await fetch(`${AUTH_BASE}/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: "Bob", email: "bob@example.com", password: "password123" }),
        });
        const data = await res.json();
        authToken = data.token;
        authUserId = data.user.id;
      });
    conventions: "ESM imports with .js extensions; named exports; express RequestHandler signatures use (req: Request, res: Response, next: NextFunction); pool from ../db.js; verifyToken from ../auth.js; JSON error responses {error: string}; declaration-merge Express.Request via `declare global { namespace Express { interface Request { user?: ... } } }` at module top-level; bun:test (describe/it/expect, beforeAll/afterAll/beforeEach); tests TRUNCATE between cases and re-register the auth user because the FK CASCADE invalidates the prior token."
    proof: "Tests must verify: (1) Unauthenticated POST/PUT/DELETE on /api/users and /api/posts return 401 {error:'Authentication required'}; (2) GET /api/users, GET /api/users/:id, GET /api/posts, GET /api/posts/:id still succeed without a token; (3) With a valid Bearer token, POST/PUT/DELETE succeed as before; (4) POST /api/posts ignores user_id in the body and persists req.user.userId as the post's user_id; (5) DELETE /api/users/:id with a non-matching, non-admin user returns 403 {error:'Forbidden'} and does not delete; same call by the owning user (or by an admin) returns 204; (6) Invalid/expired/tampered tokens return 401; (7) All 13 pre-existing assertions in test/users.test.ts and test/posts.test.ts still pass after adding the auth header to mutation requests."
    proof_type: "test"

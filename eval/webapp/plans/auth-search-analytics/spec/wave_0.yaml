items:
  - id: "0.1"
    intent: "Implement auth foundation: SQL migration adding password_hash/role to users and creating sessions table, token utilities (hashPassword, verifyPassword, generateToken, verifyToken) in src/auth.ts, and register/login endpoints in src/routes/auth.ts mounted in app.ts"
    checked: true
    files:
      - path: migrations/003_auth.sql
        isNew: true
        change: "ALTER TABLE users to add password_hash TEXT and role TEXT DEFAULT 'user' CHECK (role IN ('user','admin')); CREATE TABLE sessions with id, user_id FK, token UNIQUE, expires_at, created_at"
      - path: src/auth.ts
        isNew: true
        change: "Export hashPassword, verifyPassword using crypto.scrypt with salt:hash format; generateToken producing base64url payload.signature signed with HMAC-SHA256; verifyToken validating signature and expiry returning {userId} or null"
      - path: src/routes/auth.ts
        isNew: true
        change: "Express Router with POST /register (201, 409 on duplicate email, 400 on short password) and POST /login (200 with token, 401 on bad credentials)"
      - path: src/app.ts
        isNew: false
        change: "Mount authRouter at /api/auth (already present in current file — verify import path matches new src/routes/auth.ts)"
    tests:
      - "test/auth.test.ts"
    verify: "bun run src/migrate.ts && bun test test/auth.test.ts"
    mirror: "src/routes/users.ts"
    context: |
      // src/app.ts — current mount points
      import { usersRouter } from "./routes/users.js";
      import { postsRouter } from "./routes/posts.js";
      app.use("/api/users", usersRouter);
      app.use("/api/posts", postsRouter);
      // app.ts already imports authRouter from "./routes/auth.js" and mounts at /api/auth

      // migrations/001_create_users.sql — users table schema
      CREATE TABLE IF NOT EXISTS users (
        id SERIAL PRIMARY KEY,
        name TEXT NOT NULL,
        email TEXT UNIQUE NOT NULL,
        created_at TIMESTAMPTZ DEFAULT NOW()
      );

      // migrations/002_create_posts.sql — FK pattern for reference
      CREATE TABLE IF NOT EXISTS posts (
        id SERIAL PRIMARY KEY,
        user_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        created_at TIMESTAMPTZ DEFAULT NOW()
      );

      // src/routes/users.ts — router export pattern
      import { Router, type Request, type Response } from "express";
      import { pool } from "../db.js";
      export const usersRouter = Router();
    conventions: "ESM imports with .js extensions, named Router exports (usersRouter/postsRouter pattern), express.Request/Response types, pool.query for DB access, bun:test framework, migrations are plain SQL files sorted and run sequentially by src/migrate.ts"
    proof: "test/auth.test.ts must assert: POST /api/auth/register with valid {name,email,password} returns 201 with {user:{id,name,email,role},token}; duplicate email returns 409; password <8 chars returns 400. POST /api/auth/login with correct credentials returns 200 with {user,token}; wrong password returns 401; unknown email returns 401. verifyToken(generateToken(userId)) returns {userId}. hashPassword/verifyPassword round-trip returns true; wrong password returns false."
    proof_type: "test"

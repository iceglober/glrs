items:
  - id: "0.1"
    intent: "Add migration 003_auth.sql: add password_hash and role columns to users; create sessions table with id, user_id (FK with ON DELETE CASCADE), token (UNIQUE), expires_at, created_at."
    checked: true
    files:
      - path: migrations/003_auth.sql
        isNew: true
        change: "Create new migration adding password_hash TEXT and role TEXT DEFAULT 'user' CHECK (role IN ('user','admin')) to users, plus a new sessions table."
    tests:
      - "test/auth.test.ts"
    verify: "bun run src/migrate.ts"
    mirror: "migrations/002_create_posts.sql"
    context: |
      -- migrations/001_create_users.sql
      CREATE TABLE IF NOT EXISTS users (
        id SERIAL PRIMARY KEY,
        name TEXT NOT NULL,
        email TEXT UNIQUE NOT NULL,
        created_at TIMESTAMPTZ DEFAULT NOW()
      );

      -- migrations/002_create_posts.sql
      CREATE TABLE IF NOT EXISTS posts (
        id SERIAL PRIMARY KEY,
        title TEXT NOT NULL,
        body TEXT NOT NULL,
        user_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        created_at TIMESTAMPTZ DEFAULT NOW()
      );
    conventions: "SQL migrations are plain .sql files in migrations/, numbered NNN_name.sql, applied in lexical order by src/migrate.ts. Use IF NOT EXISTS for tables, SERIAL PRIMARY KEY, TIMESTAMPTZ DEFAULT NOW(), and REFERENCES ... ON DELETE CASCADE for FKs."
    proof: "Running `bun run src/migrate.ts` succeeds. After migration, `users` table has password_hash (TEXT, nullable) and role (TEXT, default 'user', CHECK constraint allowing only 'user'/'admin'); `sessions` table exists with columns id (SERIAL PK), user_id (INTEGER FK to users with ON DELETE CASCADE), token (TEXT UNIQUE NOT NULL), expires_at (TIMESTAMPTZ NOT NULL), created_at (TIMESTAMPTZ DEFAULT NOW())."
    proof_type: "script"

  - id: "0.2"
    intent: "Create src/auth.ts exporting hashPassword (scrypt with salt, salt:hash format), verifyPassword, generateToken (HMAC-SHA256 signed JSON payload with 24h expiry, base64url payload.signature), and verifyToken (validates signature + expiration)."
    checked: false
    files:
      - path: src/auth.ts
        isNew: true
        change: "New module exporting hashPassword(password): Promise<string>, verifyPassword(password, stored): Promise<boolean>, generateToken(userId): string, verifyToken(token): {userId: number} | null. Uses node:crypto (scrypt, randomBytes, createHmac, timingSafeEqual). Reads AUTH_SECRET from process.env (default 'dev-secret')."
    tests:
      - "test/auth.test.ts"
    verify: "bun test test/auth.test.ts"
    mirror: "src/db.ts"
    context: |
      // src/app.ts imports authRouter from "./routes/auth.js" and mounts it at /api/auth
      // src/routes/users.ts references req.user!.userId and req.user!.role,
      // so verifyToken must return {userId: number} (role is loaded separately by middleware).
      //
      // Token format per plan: base64url(JSON {userId, exp: now+24h}) + "." + HMAC-SHA256 signature.
      // Password format per plan: "<saltHex>:<hashHex>" from crypto.scrypt with random salt.
    conventions: "ESM imports with .js extension on relative paths; named exports; TypeScript strict; async functions return Promises explicitly; use node:crypto built-ins; no external deps for auth."
    proof: "Unit tests verify: hashPassword returns a string of form salt:hash with two hex segments; verifyPassword returns true for the correct password and false for a wrong one; generateToken+verifyToken roundtrip returns the original userId; verifyToken returns null for a tampered signature; verifyToken returns null for an expired token (exp in the past)."
    proof_type: "test"

  - id: "0.3"
    intent: "Create src/routes/auth.ts with POST /api/auth/register (201 with {user, token}, 409 on duplicate email, 400 on password <8 chars) and POST /api/auth/login (200 with {user, token}, 401 on wrong email or password, inserts a session row). Mount under /api/auth in src/app.ts."
    checked: false
    files:
      - path: src/routes/auth.ts
        isNew: true
        change: "New Express Router exporting authRouter. Register hashes password, inserts user, generates token, inserts session, returns {user: {id, name, email, role}, token} with 201. Login looks up user by email, verifies password, generates token, inserts session, returns same shape with 200. Reject duplicate email (409) and short password (400) on register; reject bad credentials (401) on login."
      - path: src/app.ts
        isNew: false
        change: "Import authRouter and mount with app.use('/api/auth', authRouter)."
    tests:
      - "test/auth.test.ts"
    verify: "bun test test/auth.test.ts"
    mirror: "src/routes/users.ts"
    context: |
      // src/app.ts (current)
      import express from "express";
      import { join } from "path";
      import { usersRouter } from "./routes/users.js";
      import { postsRouter } from "./routes/posts.js";
      // ...
      app.use("/api/users", usersRouter);
      app.use("/api/posts", postsRouter);

      // src/routes/users.ts pattern:
      import { Router, type Request, type Response } from "express";
      import { pool } from "../db.js";
      export const usersRouter = Router();
      usersRouter.post("/", async (req: Request, res: Response) => { ... });
    conventions: "ESM imports with .js suffix on relative paths; named export `${name}Router` from src/routes/*.ts; pool.query with parameterized $1, $2 placeholders; status codes set via res.status().json(); error shape is {error: '...'}; return early after sending response."
    proof: "Tests confirm: POST /api/auth/register with {name, email, password>=8} returns 201 with {user: {id, name, email, role: 'user'}, token: string}; second register with same email returns 409; password shorter than 8 chars returns 400; POST /api/auth/login with correct credentials returns 200 with the same shape and a session row exists in the sessions table for that token; wrong email returns 401; wrong password returns 401. authRouter is mounted in src/app.ts at /api/auth."
    proof_type: "test"

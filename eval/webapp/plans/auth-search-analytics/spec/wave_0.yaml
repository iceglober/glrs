items:
  - id: "0.1"
    intent: "Implement auth foundation: schema migration (password_hash, role, sessions table), token utilities (hashPassword/verifyPassword/generateToken/verifyToken), and register/login endpoints mounted at /api/auth."
    checked: true
    files:
      - path: migrations/003_auth.sql
        isNew: true
        change: "Add password_hash TEXT and role TEXT DEFAULT 'user' CHECK (role IN ('user','admin')) columns to users; create sessions table with id SERIAL PK, user_id FK to users ON DELETE CASCADE, token TEXT UNIQUE NOT NULL, expires_at TIMESTAMPTZ NOT NULL, created_at TIMESTAMPTZ DEFAULT NOW()."
      - path: src/auth.ts
        isNew: true
        change: "Implement hashPassword (scrypt with random salt, returns 'salt:hash'), verifyPassword (splits and compares), generateToken (HMAC-SHA256 over JSON {userId, exp: now+24h} using AUTH_SECRET, returns base64url 'payload.signature'), verifyToken (validates signature and exp, returns {userId} or null)."
      - path: src/routes/auth.ts
        isNew: true
        change: "Export authRouter with POST /register (hash password, insert user, return {user:{id,name,email,role}, token}, 201; 409 on duplicate email; 400 if password <8 chars) and POST /login (verify credentials, insert session, return {user, token}; 401 on wrong creds)."
      - path: src/app.ts
        isNew: false
        change: "Import authRouter and mount it at /api/auth."
    tests:
      - "test/auth.test.ts"
    verify: "bun run src/migrate.ts && bun test test/auth.test.ts"
    mirror: "src/routes/users.ts"
    context: |
      // src/app.ts (current)
      import express from "express";
      import { usersRouter } from "./routes/users.js";
      import { postsRouter } from "./routes/posts.js";
      export const app = express();
      app.use(express.json());
      app.use("/api/users", usersRouter);
      app.use("/api/posts", postsRouter);

      // migrations/001_create_users.sql (existing)
      CREATE TABLE IF NOT EXISTS users (
        id SERIAL PRIMARY KEY,
        name TEXT NOT NULL,
        email TEXT UNIQUE NOT NULL,
        created_at TIMESTAMPTZ DEFAULT NOW()
      );

      // src/db.ts — shared pg pool
      import pg from "pg";
      const { Pool } = pg;
      export const pool = new Pool({ connectionString: DATABASE_URL });

      // Router pattern (from src/routes/users.ts)
      import { Router, type Request, type Response } from "express";
      import { pool } from "../db.js";
      export const usersRouter = Router();
      usersRouter.post("/", async (req: Request, res: Response) => {
        const { name, email } = req.body;
        if (!name || !email) { res.status(400).json({ error: "..." }); return; }
        const { rows } = await pool.query("INSERT INTO users ...", [name, email]);
        res.status(201).json(rows[0]);
      });
    conventions: "ESM imports with .js extensions; named exports (export const xRouter = Router()); express Request/Response types from 'express'; pg pool imported from ../db.js; bun:test for tests (describe/it/expect, beforeAll/afterAll/beforeEach); JSON error responses {error: string}; migrations are plain .sql files in migrations/ applied alphabetically by src/migrate.ts."
    proof: "Tests must verify: (1) migration applies cleanly and users table has password_hash + role columns, sessions table exists with required columns/constraints; (2) hashPassword produces 'salt:hash' format and verifyPassword returns true for correct password, false for wrong; (3) generateToken+verifyToken roundtrip yields {userId}, tampered tokens return null, expired tokens return null; (4) POST /api/auth/register with valid {name,email,password} returns 201 with {user:{id,name,email,role:'user'}, token}; duplicate email returns 409; password <8 chars returns 400; (5) POST /api/auth/login with correct credentials returns {user, token} and inserts a sessions row; wrong password returns 401; unknown email returns 401."
    proof_type: "test"

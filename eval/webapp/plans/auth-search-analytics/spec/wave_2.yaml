items:
  - id: "2.1"
    intent: "Add migration that adds search_vector TSVECTOR column to posts, creates a GIN index, creates a trigger function that auto-updates search_vector from title and body using to_tsvector('english', title || ' ' || body) on INSERT/UPDATE, and backfills existing rows."
    checked: true
    files:
      - path: migrations/004_search.sql
        isNew: true
        change: "New migration. ALTER TABLE posts ADD COLUMN search_vector TSVECTOR; CREATE INDEX posts_search_vector_idx ON posts USING GIN (search_vector); CREATE OR REPLACE FUNCTION posts_search_vector_update() RETURNS trigger that sets NEW.search_vector = to_tsvector('english', coalesce(NEW.title,'') || ' ' || coalesce(NEW.body,'')); CREATE TRIGGER ... BEFORE INSERT OR UPDATE ON posts; UPDATE posts SET search_vector = to_tsvector('english', title || ' ' || body) to backfill."
    tests:
      - "test/search.test.ts"
    verify: "bun run src/migrate.ts"
    mirror: "migrations/002_create_posts.sql"
    context: |
      -- migrations/002_create_posts.sql
      CREATE TABLE IF NOT EXISTS posts (
        id SERIAL PRIMARY KEY,
        title TEXT NOT NULL,
        body TEXT NOT NULL,
        user_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        created_at TIMESTAMPTZ DEFAULT NOW()
      );
    conventions: "Plain SQL migrations numbered NNN_name.sql, applied in lexicographic order by src/migrate.ts. Use IF NOT EXISTS / CREATE OR REPLACE for idempotency since tests re-run migrations in beforeAll."
    proof: "Running bun run src/migrate.ts applies the migration without error. After running it, posts table has a search_vector column (verify via information_schema.columns), a GIN index exists on it, the trigger exists, and inserting a row populates search_vector automatically. Existing rows have non-null search_vector after backfill."
    proof_type: "script"

  - id: "2.2"
    intent: "Add GET /api/posts/search?q=<query> to the posts router. Uses to_tsquery('english', q) against search_vector. Returns matching posts ordered by ts_rank descending, each result including a headline field from ts_headline('english', body, query). Returns empty array when no matches, 400 when q missing."
    checked: false
    files:
      - path: src/routes/posts.ts
        isNew: false
        change: "Add a new route handler postsRouter.get('/search', ...) BEFORE the postsRouter.get('/:id', ...) handler so '/search' doesn't get captured as :id. Handler reads req.query.q, returns 400 if missing, otherwise runs the tsquery search and returns rows (with ts_rank and ts_headline). No auth required."
    tests:
      - "test/search.test.ts"
    verify: "bun test test/search.test.ts"
    mirror: "src/routes/posts.ts"
    context: |
      // src/routes/posts.ts (existing pattern in this file)
      postsRouter.get("/search", async (req: Request, res: Response) => {
        const q = req.query.q as string | undefined;
        if (!q) {
          res.status(400).json({ error: "q is required" });
          return;
        }
        const { rows } = await pool.query(
          `SELECT *, ts_rank(search_vector, query) AS rank,
                  ts_headline('english', body, query) AS headline
           FROM posts, to_tsquery('english', $1) AS query
           WHERE search_vector @@ query
           ORDER BY rank DESC`,
          [q],
        );
        res.json(rows);
      });
      // NOTE: Must be registered before postsRouter.get("/:id", ...)
    conventions: "Express Router, ESM imports with .js suffix, async (req: Request, res: Response) handlers, parameterized pool.query with $1 placeholders, res.status().json() for errors. Route order matters: /search must precede /:id."
    proof: "GET /api/posts/search without q returns 400. GET /api/posts/search?q=word with no matches returns []. GET /api/posts/search?q=word with matches returns an array ordered by ts_rank descending where each item has a headline field containing <b>...</b> markers around matched terms."
    proof_type: "test"

  - id: "2.3"
    intent: "Convert GET /api/posts and GET /api/users to cursor-based pagination. Accept ?limit=N&cursor=<opaque base64url JSON>. Cursor for posts is {id, created_at}; for users {id}. Response envelope: {data, next_cursor, has_more}. Default limit 10, max 100. Update test/users.test.ts and test/posts.test.ts to unwrap response.body.data anywhere a bare array was expected."
    checked: false
    files:
      - path: src/routes/posts.ts
        isNew: false
        change: "GET / handler: parse limit (clamp 1..100, default 10) and cursor (base64url-decoded JSON {id, created_at}). Without cursor: SELECT ... ORDER BY created_at DESC, id DESC LIMIT limit+1. With cursor: SELECT ... WHERE (created_at, id) < ($cursor_created_at, $cursor_id) ORDER BY created_at DESC, id DESC LIMIT limit+1. Compute has_more from rows.length > limit, slice to limit, build next_cursor by base64url-encoding {id, created_at} of last row when has_more. Return {data, next_cursor, has_more}. Return 400 on malformed cursor."
      - path: src/routes/users.ts
        isNew: false
        change: "GET / handler: same shape as posts but cursor is just {id} and ordering is ORDER BY id DESC."
      - path: test/users.test.ts
        isNew: false
        change: "Any assertion that expected a bare array from GET /api/users must read response.body.data instead. Existing length / element index checks must shift to data."
      - path: test/posts.test.ts
        isNew: false
        change: "Same change as users.test.ts but for GET /api/posts."
    tests:
      - "test/pagination.test.ts"
      - "test/users.test.ts"
      - "test/posts.test.ts"
    verify: "bun test"
    mirror: "src/routes/posts.ts"
    context: |
      // src/routes/posts.ts — GET / pagination pattern
      postsRouter.get("/", async (req: Request, res: Response) => {
        const limit = Math.min(Math.max(1, parseInt(req.query.limit as string) || 10), 100);
        const cursorParam = req.query.cursor as string | undefined;
        let rows: Record<string, unknown>[];
        if (cursorParam) {
          let cursor: { id: number; created_at: string };
          try {
            cursor = JSON.parse(Buffer.from(cursorParam, "base64url").toString());
            if (!cursor.id || !cursor.created_at) throw new Error("invalid");
          } catch {
            res.status(400).json({ error: "invalid cursor" });
            return;
          }
          ({ rows } = await pool.query(
            `SELECT * FROM posts
             WHERE (created_at, id) < ($1::timestamptz, $2::int)
             ORDER BY created_at DESC, id DESC
             LIMIT $3`,
            [cursor.created_at, cursor.id, limit + 1],
          ));
        } else {
          ({ rows } = await pool.query(
            "SELECT * FROM posts ORDER BY created_at DESC, id DESC LIMIT $1",
            [limit + 1],
          ));
        }
        const has_more = rows.length > limit;
        if (has_more) rows = rows.slice(0, limit);
        const last = rows[rows.length - 1] as { id: number; created_at: string } | undefined;
        const next_cursor = has_more && last
          ? Buffer.from(JSON.stringify({ id: last.id, created_at: last.created_at })).toString("base64url")
          : null;
        res.json({ data: rows, next_cursor, has_more });
      });
    conventions: "Cursor encoded with Buffer.from(JSON.stringify(...)).toString('base64url') and decoded with Buffer.from(s, 'base64url').toString(). Limit clamped via Math.min(Math.max(1, parseInt(...) || 10), 100). Keyset pagination uses tuple comparison (created_at, id) for posts and plain id for users so ordering is total. Express ESM imports use .js suffix. Tests use bun:test (describe/it/expect/beforeAll/afterAll/beforeEach) and TRUNCATE ... RESTART IDENTITY CASCADE between cases."
    proof: "GET /api/posts and GET /api/users with no params return {data: [...], next_cursor, has_more} with up to 10 items, most recent first. limit=N respects 1..100 clamp. With more than limit rows, has_more is true and next_cursor is a non-null base64url string. Passing that cursor back returns the next page and eventually has_more becomes false with next_cursor null. Malformed cursor returns 400. All existing tests (test/users.test.ts, test/posts.test.ts) pass after being updated to unwrap response.body.data. bun test (full suite) passes."
    proof_type: "test"

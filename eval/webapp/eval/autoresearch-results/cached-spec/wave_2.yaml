items:
  - id: "2.1"
    intent: "Add full-text search to posts via a search_vector TSVECTOR column with GIN index and trigger, expose GET /api/posts/search?q=, and add cursor-based pagination envelope to GET /api/posts and GET /api/users"
    checked: false
    files:
      - path: migrations/004_search.sql
        isNew: true
        change: "Create search_vector TSVECTOR column on posts, GIN index, trigger function that calls to_tsvector('english', title || ' ' || body) on INSERT/UPDATE, and backfill existing rows"
      - path: src/routes/posts.ts
        isNew: false
        change: "Add GET /api/posts/search?q= endpoint using to_tsquery + ts_rank + ts_headline; change GET /api/posts to return {data, next_cursor, has_more} cursor-paginated envelope"
      - path: src/routes/users.ts
        isNew: false
        change: "Change GET /api/users to return {data, next_cursor, has_more} cursor-paginated envelope"
      - path: test/users.test.ts
        isNew: false
        change: "Update any bare-array assertions on GET /api/users to unwrap response.body.data"
      - path: test/posts.test.ts
        isNew: false
        change: "Update any bare-array assertions on GET /api/posts to unwrap response.body.data"
    tests:
      - "test/search.test.ts"
      - "test/pagination.test.ts"
      - "test/users.test.ts"
      - "test/posts.test.ts"
    verify: "bun test"
    mirror: "migrations/002_create_posts.sql"
    context: |
      // migrations/002_create_posts.sql
      CREATE TABLE IF NOT EXISTS posts (
        id SERIAL PRIMARY KEY,
        title TEXT NOT NULL,
        body TEXT NOT NULL,
        user_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        created_at TIMESTAMPTZ DEFAULT NOW()
      );

      // src/routes/posts.ts — GET /api/posts (cursor pagination already in place)
      postsRouter.get("/", async (req, res) => {
        const limit = Math.min(Math.max(1, parseInt(req.query.limit as string) || 10), 100);
        const cursorParam = req.query.cursor as string | undefined;
        // ... cursor decode + query ...
        res.json({ data: rows, next_cursor, has_more });
      });

      // src/routes/posts.ts — GET /api/posts/search (must be registered before /:id)
      postsRouter.get("/search", async (req, res) => {
        const q = req.query.q as string | undefined;
        if (!q) { res.status(400).json({ error: "q is required" }); return; }
        const { rows } = await pool.query(
          `SELECT *, ts_rank(search_vector, query) AS rank,
                  ts_headline('english', body, query) AS headline
           FROM posts, to_tsquery('english', $1) AS query
           WHERE search_vector @@ query ORDER BY rank DESC`, [q]);
        res.json(rows);
      });
    conventions: "ESM imports with .js extension, named Router exports, pool.query for all DB access, bun:test with describe/it/expect, fetch-based HTTP tests against a live server started in beforeAll, TRUNCATE...RESTART IDENTITY CASCADE in beforeEach, SQL migrations run alphabetically via readdirSync"
    proof: "Run bun test and assert all four test files pass. Specifically: (1) search_vector column and GIN index exist in pg_indexes; (2) trigger populates search_vector on INSERT and UPDATE; (3) GET /api/posts/search?q=<term> returns rows with a headline field containing <b> tags; (4) GET /api/posts/search without q returns 400; (5) GET /api/posts and GET /api/users both return {data: [...], next_cursor, has_more} envelopes; (6) cursor traversal across pages yields all rows without duplication; (7) malformed cursor returns 400"
    proof_type: "test"
